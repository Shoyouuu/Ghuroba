<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DJ Club Final Mode</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
    height:100vh;
    background:black;
    overflow:hidden;
    font-family:monospace;
}

#screen{
    width:100%;
    height:100%;
    transform:translateZ(0);
    will-change: transform, filter;
}

img{
    position:absolute;
    width:100%;
    height:100%;
    object-fit:contain;
    background:black;
}

#typing{
    position:absolute;
    top:20px;
    width:100%;
    text-align:center;
    font-size:14px;
    z-index:10;
}

canvas{
    position:absolute;
    bottom:0;
    width:100%;
    height:140px;
    opacity:0.75;
}

#btn{
    position:absolute;
    bottom:40px;
    left:50%;
    transform:translateX(-50%);
    padding:12px;
    background:#c2185b;
    color:white;
    border:none;
    width:80%;
}
</style>
</head>

<body>

<div id="screen">
    <div id="typing"></div>
    <img id="bg">
    <canvas id="wave"></canvas>
    <button id="btn">▶️ PLAY</button>
</div>

<audio id="music" loop></audio>

<script>

// ===== ELEMENT =====
let bg=document.getElementById("bg");
let audio=document.getElementById("music");
let btn=document.getElementById("btn");
let screen=document.getElementById("screen");
let typing=document.getElementById("typing");
let canvas=document.getElementById("wave");
let c=canvas.getContext("2d");

// ===== MEDIA =====
const images=[
"assets/1.png","assets/2.png","assets/3.png","assets/4.png",
"assets/5.jpg","assets/6.jpeg","assets/7.jpeg","assets/8.png",
"assets/9.png"
];

const songs=[
"assets/1.mp3","assets/2.mp3","assets/3.mp3",
"assets/4.mp3","assets/5.mp3"
];

// ===== LOAD RANDOM =====
function loadRandom(){
    bg.src=images[Math.floor(Math.random()*images.length)];
    audio.src=songs[Math.floor(Math.random()*songs.length)];
}
loadRandom();

audio.addEventListener("ended",()=>{
    loadRandom();
    audio.play();
});

// ===== TEXT =====
let text="TY FOR THROWING MBG 💀";
let i=0;

function type(){
    if(i < text.length){
        typing.innerHTML += text[i++];
        setTimeout(type,55);
    }
}
type();

// ===== AUDIO =====
let ctx, analyser, source, data;
let running=false;

// ===== CAMERA =====
let camX=0, camY=0;

// ===== ENERGY =====
let bass=0;
let energy=0;
let smoothedBass=0;
let smoothedEnergy=0;
let lastEnergy=0;

// ===== EFFECT =====
let freeze=false;
let resetStrength=0;

// ===== PLAY =====
btn.onclick=()=>{
    audio.play();

    if(!ctx){
        setupAudio();
    }else if(ctx.state==="suspended"){
        ctx.resume();
    }

    btn.style.display="none";
};

// ===== AUDIO SETUP =====
function setupAudio(){

    if(running) return;
    running=true;

    ctx=new (window.AudioContext||window.webkitAudioContext)();

    analyser=ctx.createAnalyser();
    source=ctx.createMediaElementSource(audio);

    source.connect(analyser);
    analyser.connect(ctx.destination);

    analyser.fftSize=256;
    data=new Uint8Array(analyser.frequencyBinCount);

    resize();
    window.addEventListener("resize",resize);

    loop();
}

// ===== RESIZE =====
function resize(){
    canvas.width=innerWidth;
    canvas.height=140;
}

// ===== VISUALIZER =====
function draw(){

    analyser.getByteFrequencyData(data);

    c.clearRect(0,0,canvas.width,canvas.height);

    let w=canvas.width/data.length;

    for(let i=0;i<data.length;i++){
        let h=data[i]*0.55;
        c.fillStyle="#00d9ff";
        c.fillRect(i*w,canvas.height-h,w-1,h);
    }
}

// ===== LOOP =====
function loop(){

    analyser.getByteFrequencyData(data);

    let b=0;
    for(let i=0;i<5;i++) b+=data[i];
    bass=b/5;

    let e=0;
    for(let i=0;i<10;i++) e+=data[i];
    energy=e/10;

    smoothedBass += (bass-smoothedBass)*0.15;
    smoothedEnergy += (energy-smoothedEnergy)*0.1;

    let diff = smoothedEnergy - lastEnergy;

    // ===== DETECT =====
    let kick = smoothedBass > 90 && diff > 5;
    let hardDrop = smoothedBass > 130 && diff > 10;

    // ===== DROP MODE =====
    if(hardDrop && !freeze){
        freeze = true;

        screen.style.filter = "brightness(1.6)";
        setTimeout(()=>screen.style.filter="none",90);

        setTimeout(()=>{
            freeze = false;
            resetStrength = 1;
        },200);
    }

    // ===== SHAKE =====
    if(!freeze && kick){
        camX += (Math.random()-0.5)*6;
        camY += (Math.random()-0.5)*6;

        resetStrength = 0.7;
    }

    // ===== SMOOTH RESET =====
    camX *= 0.93;
    camY *= 0.93;

    if(resetStrength > 0){
        camX *= (1 - resetStrength*0.08);
        camY *= (1 - resetStrength*0.08);
        resetStrength *= 0.92;
    }

    // ===== APPLY CAMERA =====
    screen.style.transform = `
    translate(${camX}px,${camY}px)
    `;

    // ===== TEXT COLOR SYSTEM =====
    if(freeze){
        typing.style.color = "#00aaff";
    }else{
        typing.style.color = `hsl(${Date.now()*0.05 % 360},100%,60%)`;
    }

    lastEnergy=smoothedEnergy;

    draw();
    requestAnimationFrame(loop);
}

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kick Drop Visualizer</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
    height:100vh;
    background:black;
    overflow:hidden;
    font-family:monospace;
}

/* IMAGE NORMAL */
#bg{
    position:absolute;
    width:100%;
    height:100%;
    object-fit:contain;
    background:black;
}

/* TEXT */
#typing{
    position:absolute;
    top:20px;
    width:100%;
    text-align:center;
    font-size:14px;
    color:white;
    z-index:10;
}

/* CANVAS */
canvas{
    position:absolute;
    bottom:0;
    width:100%;
    height:140px;
    transition:0.1s;
}

/* GLOW */
#glow{
    position:absolute;
    width:100%;
    height:100%;
    background:radial-gradient(circle, rgba(0,200,255,0.15), transparent 60%);
    mix-blend-mode:screen;
    pointer-events:none;
    transition:0.1s;
}
</style>
</head>

<body>

<img id="bg">
<div id="glow"></div>
<div id="typing"></div>
<canvas id="wave"></canvas>

<audio id="music" loop></audio>

<script>

// ================= ELEMENT =================
let bg=document.getElementById("bg");
let music=document.getElementById("music");
let typing=document.getElementById("typing");
let canvas=document.getElementById("wave");
let glow=document.getElementById("glow");
let c=canvas.getContext("2d");

// ================= MEDIA =================
const images=[
"assets/1.png","assets/2.png","assets/3.png","assets/4.png",
"assets/5.jpg","assets/6.jpeg","assets/7.jpeg","assets/8.png",
"assets/9.png"
];

const songs=[
"assets/1.mp3","assets/2.mp3","assets/3.mp3",
"assets/4.mp3","assets/5.mp3"
];

// ================= LOAD RANDOM =================
function loadRandom(){
    bg.src=images[Math.floor(Math.random()*images.length)];
    music.src=songs[Math.floor(Math.random()*songs.length)];
}
loadRandom();

music.addEventListener("ended",()=>{
    loadRandom();
    music.play();
});

// ================= TEXT =================
let text="TY FOR THROWING MBG 💀";
let i=0;

function type(){
    if(i < text.length){
        typing.innerHTML += text[i++];
        setTimeout(type,55);
    }
}
type();

// ================= AUDIO =================
let ctx, analyser, source, data;
let running=false;

// ================= MODE =================
let mode="normal";
let modeTimer=0;

// ================= KICK SYSTEM =================
let smoothedBass=0;
let lastBass=0;
let kickCooldown=0;

// ================= START =================
document.body.addEventListener("click",()=>{
    music.play();
    if(!ctx) setupAudio();
},{once:true});

// ================= AUDIO SETUP =================
function setupAudio(){

    ctx=new (window.AudioContext||window.webkitAudioContext)();

    analyser=ctx.createAnalyser();
    source=ctx.createMediaElementSource(music);

    source.connect(analyser);
    analyser.connect(ctx.destination);

    analyser.fftSize=256;
    data=new Uint8Array(analyser.frequencyBinCount);

    resize();
    window.addEventListener("resize",resize);

    loop();
}

// ================= RESIZE =================
function resize(){
    canvas.width=innerWidth;
    canvas.height=140;
}

// ================= GLOW =================
function setGlow(v){
    glow.style.background =
        `radial-gradient(circle,
        rgba(0,200,255,${v}),
        transparent 60%)`;
}

// ================= DRAW =================
function draw(){

    analyser.getByteFrequencyData(data);

    c.clearRect(0,0,canvas.width,canvas.height);

    let w = canvas.width / data.length;

    // ================= KICK RANGE =================
    let bass=0;
    for(let i=0;i<6;i++) bass += data[i];
    bass /= 6;

    // ================= SMOOTH =================
    smoothedBass += (bass - smoothedBass) * 0.25;

    let delta = smoothedBass - lastBass;

    // ================= KICK DETECTION =================
    let kick =
        delta > 10 &&
        smoothedBass > 85 &&
        kickCooldown <= 0;

    if(kick){
        mode = "drop";
        modeTimer = 8;     // 🔥 short punch drop
        kickCooldown = 8;
    }

    if(modeTimer > 0){
        modeTimer--;
    }else{
        mode = "normal";
    }

    if(kickCooldown > 0) kickCooldown--;

    lastBass = smoothedBass;

    // ================= EFFECT =================
    let drop = mode === "drop";

    let barMul = drop ? 2.5 : 0.9;
    let glowVal = drop ? 0.5 : 0.15;

    setGlow(glowVal);

    canvas.style.filter = drop ? "brightness(1.5)" : "brightness(1)";

    // ================= RAINBOW BAR =================
    for(let i=0;i<data.length;i++){

        let h = data[i] * barMul;

        let hue = (i / data.length) * 360;

        c.fillStyle = `hsl(${hue},100%,60%)`;

        c.fillRect(i*w, canvas.height - h, w-1, h);
    }
}

// ================= LOOP =================
function loop(){
    draw();
    requestAnimationFrame(loop);
}

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Full Restore MV</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
    height:100vh;
    background:black;
    overflow:hidden;
}

/* CENTER IMAGE */
#img{
    position:absolute;
    width:60%;
    height:60%;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    object-fit:contain;
    z-index:2;
}

/* MILKDROP FRAME */
canvas{
    position:absolute;
    top:0;
    left:0;
    width:100%;
    height:100%;
    z-index:1;
}

/* TEXT */
#typing{
    position:absolute;
    top:20px;
    width:100%;
    text-align:center;
    font-size:14px;
    z-index:10;
    font-family:monospace;
}
</style>
</head>

<body>

<div id="typing"></div>
<img id="img">
<canvas id="c"></canvas>
<audio id="music"></audio>

<script>

// ================= ELEMENT =================
let img=document.getElementById("img");
let audio=document.getElementById("music");
let typing=document.getElementById("typing");
let canvas=document.getElementById("c");
let ctx=canvas.getContext("2d");

// ================= RESIZE =================
function resize(){
    canvas.width=innerWidth;
    canvas.height=innerHeight;
}
resize();
window.addEventListener("resize",resize);

// ================= ASSETS =================
const images=[
"assets/1.png","assets/2.png","assets/3.png","assets/4.png",
"assets/5.jpg","assets/6.jpeg","assets/7.jpeg","assets/8.png",
"assets/9.png"
];

const songs=[
"assets/1.mp3","assets/2.mp3","assets/3.mp3",
"assets/4.mp3","assets/5.mp3"
];

// ================= RANDOM LOAD =================
function loadRandom(){
    img.src = images[Math.floor(Math.random()*images.length)];
    audio.src = songs[Math.floor(Math.random()*songs.length)];
}
loadRandom();

// ================= AUDIO ENGINE =================
let ctxA, analyser, source, data;
let running=false;

// ================= TEXT =================
let text="TY FOR THROWING MBG 💀";
let i=0;
let glitch=false;

function type(){
    if(i < text.length){
        typing.innerHTML += text[i++];
        setTimeout(type,55);
    }
}
type();

// ================= RAINBOW =================
let hue=0;
function rainbow(){
    hue+=1.2;
    return `hsl(${hue},100%,60%)`;
}

// ================= AUTO NEXT =================
audio.addEventListener("ended",()=>{
    loadRandom();
    audio.play();
});

audio.addEventListener("play",()=>{
    if(!ctxA) setupAudio();
});

// ================= AUDIO SETUP =================
function setupAudio(){

    ctxA=new (window.AudioContext||window.webkitAudioContext)();

    analyser=ctxA.createAnalyser();
    source=ctxA.createMediaElementSource(audio);

    source.connect(analyser);
    analyser.connect(ctxA.destination);

    analyser.fftSize=256;
    data=new Uint8Array(analyser.frequencyBinCount);

    loop();
}

// ================= LOOP =================
function loop(){

    analyser.getByteFrequencyData(data);

    // bass detect
    let bass=0;
    for(let i=0;i<6;i++) bass+=data[i];
    bass/=6;

    let drop = bass > 135;

    // ================= GLITCH TEXT =================
    if(drop && !glitch){
        glitch=true;

        typing.style.color="#00aaff";

        let original=text;
        let fx=setInterval(()=>{
            typing.innerHTML = original
                .split("")
                .map(c=>Math.random()>0.7?"█":c)
                .join("");
        },60);

        setTimeout(()=>{
            clearInterval(fx);
            typing.innerHTML=original;
            glitch=false;
        },400);

    }else if(!glitch){
        typing.style.color=rainbow();
    }

    // ================= MILKDROP FRAME =================
    ctx.fillStyle="rgba(0,0,0,0.25)";
    ctx.fillRect(0,0,canvas.width,canvas.height);

    for(let i=0;i<70;i++){

        let a=i/70*Math.PI*2;
        let r=200+bass*2;

        let x=canvas.width/2 + Math.cos(a)*r;
        let y=canvas.height/2 + Math.sin(a)*r;

        ctx.fillStyle=rainbow();
        ctx.fillRect(x,y,2,2);
    }

    requestAnimationFrame(loop);
}

</script>

</body>
</html>

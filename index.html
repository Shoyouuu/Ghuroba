<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Spotify Canvas Pro + Spectrum</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
    height:100vh;
    background:black;
    overflow:hidden;
    font-family:monospace;
}

/* IMAGE NORMAL */
#bg{
    position:absolute;
    width:60%;
    height:60%;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    object-fit:contain;
    background:black;
}

/* OVERLAY */
#overlay{
    position:absolute;
    width:100%;
    height:100%;
    background:radial-gradient(circle at center, transparent 0%, rgba(0,0,0,0.7) 70%, black 100%);
}

/* TYPING */
#typing{
    position:absolute;
    top:25px;
    width:100%;
    text-align:center;
    font-size:14px;
    letter-spacing:2px;
    color:white;
    opacity:0.85;
    z-index:10;
}

/* UI */
#ui{
    position:absolute;
    bottom:80px;
    left:20px;
    color:white;
    z-index:10;
    padding:10px 14px;
    border-radius:12px;

    background:rgba(0,0,0,0.35);
    backdrop-filter:blur(10px);
    -webkit-backdrop-filter:blur(10px);

    border:1px solid rgba(255,255,255,0.08);
    opacity:0;
    animation:fadeIn 1s forwards;
}

#title{font-size:14px;font-weight:bold;}
#artist{font-size:12px;opacity:0.7;margin-top:3px;}

@keyframes fadeIn{
    to{opacity:1;}
}

/* FREQUENCY BAR */
#wave{
    position:absolute;
    bottom:0;
    width:100%;
    height:120px;
    opacity:0.8;
}
</style>
</head>

<body>

<img id="bg">
<div id="overlay"></div>

<div id="typing"></div>

<div id="ui">
    <div id="title">Loading...</div>
    <div id="artist">Unknown</div>
</div>

<canvas id="wave"></canvas>
<audio id="music" loop></audio>

<script>

// ================= ELEMENT =================
let bg=document.getElementById("bg");
let music=document.getElementById("music");
let typing=document.getElementById("typing");
let title=document.getElementById("title");
let artist=document.getElementById("artist");

let canvas=document.getElementById("wave");
let c=canvas.getContext("2d");

// ================= ASSETS =================
const images=[
"assets/1.png","assets/2.png","assets/3.png","assets/4.png",
"assets/5.jpg","assets/6.jpeg","assets/7.jpeg","assets/8.png",
"assets/9.png"
];

const songs=[
"assets/1.mp3","assets/2.mp3","assets/3.mp3",
"assets/4.mp3","assets/5.mp3"
];

const meta=[
{title:"Midnight Drift",artist:"Shoyou"},
{title:"Neon Memory",artist:"Unknown Beats"},
{title:"Slow Motion Love",artist:"Nightcore Lab"},
{title:"Empty City",artist:"Ambient Core"},
{title:"Lost Frequency",artist:"DJ Ghost"}
];

// ================= RANDOM =================
function loadRandom(){

    bg.src = images[Math.floor(Math.random()*images.length)];
    music.src = songs[Math.floor(Math.random()*songs.length)];

    let m = meta[Math.floor(Math.random()*meta.length)];
    title.innerText = m.title;
    artist.innerText = m.artist;
}
loadRandom();

// ================= AUTO NEXT =================
music.addEventListener("ended",()=>{
    loadRandom();
    music.play();
});

// ================= TEXT =================
let text="TY FOR THROWING MBG 💀";
let i=0;

function type(){
    if(i < text.length){
        typing.innerHTML += text[i++];
        setTimeout(type,60);
    }
}
type();

// ================= RAINBOW =================
function rainbow(){
    return `hsl(${Date.now()*0.05 % 360},100%,60%)`;
}

// ================= AUDIO =================
let ctx, analyser, source, data;
let running=false;

// ================= PLAY INIT =================
music.addEventListener("play",()=>{
    typing.style.color = rainbow();
});

function setupAudio(){

    ctx=new (window.AudioContext||window.webkitAudioContext)();

    analyser=ctx.createAnalyser();
    source=ctx.createMediaElementSource(music);

    source.connect(analyser);
    analyser.connect(ctx.destination);

    analyser.fftSize=256;
    data=new Uint8Array(analyser.frequencyBinCount);

    loop();
}

// ================= RESIZE =================
function resize(){
    canvas.width=innerWidth;
    canvas.height=120;
}
resize();
window.addEventListener("resize",resize);

// ================= DRAW FREQUENCY =================
function draw(){

    analyser.getByteFrequencyData(data);

    c.clearRect(0,0,canvas.width,canvas.height);

    let w = canvas.width / data.length;

    for(let i=0;i<data.length;i++){

        let h = data[i] * 0.5;

        let color;

        if(i < 8){
            color="#00ff5a"; // 🟢 LOW
        }else if(i < 40){
            color="#ffd000"; // 🟡 MID
        }else{
            color="#ff2b2b"; // 🔴 HIGH
        }

        c.fillStyle=color;
        c.fillRect(i*w, canvas.height-h, w-1, h);
    }
}

// ================= LOOP =================
function loop(){

    draw();
    requestAnimationFrame(loop);
}

// ================= START =================
document.body.addEventListener("click",()=>{
    music.play();
    if(!ctx) setupAudio();
},{once:true});

</script>

</body>
</html>

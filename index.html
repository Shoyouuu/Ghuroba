<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Spotify Canvas Pro</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
    height:100vh;
    background:black;
    overflow:hidden;
    font-family:monospace;
}

/* BACKGROUND IMAGE */
#bg{
    position:absolute;
    width:120%;
    height:120%;
    top:-10%;
    left:-10%;
    object-fit:cover;
    filter:brightness(0.7) contrast(1.1);
    transform:scale(1.05);
}

/* DARK OVERLAY */
#overlay{
    position:absolute;
    width:100%;
    height:100%;
    background:radial-gradient(circle at center, transparent 0%, rgba(0,0,0,0.7) 70%, black 100%);
}

/* TEXT */
#typing{
    position:absolute;
    top:25px;
    width:100%;
    text-align:center;
    color:white;
    font-size:14px;
    letter-spacing:2px;
    opacity:0.8;
}

/* CENTER GLOW */
#glow{
    position:absolute;
    width:100%;
    height:100%;
    background:radial-gradient(circle, rgba(0,200,255,0.08), transparent 60%);
    mix-blend-mode:screen;
}

/* BUTTON */
#btn{
    position:absolute;
    bottom:40px;
    left:50%;
    transform:translateX(-50%);
    padding:12px;
    background:#111;
    color:white;
    border:1px solid #333;
    width:80%;
}
</style>
</head>

<body>

<img id="bg">
<div id="glow"></div>
<div id="overlay"></div>

<div id="typing"></div>
<button id="btn">▶ PLAY</button>

<audio id="music" loop></audio>

<script>

// ================= ELEMENT =================
let bg=document.getElementById("bg");
let music=document.getElementById("music");
let btn=document.getElementById("btn");
let typing=document.getElementById("typing");
let glow=document.getElementById("glow");

// ================= ASSETS =================
const images=[
"assets/1.png","assets/2.png","assets/3.png","assets/4.png",
"assets/5.jpg","assets/6.jpeg","assets/7.jpeg","assets/8.png",
"assets/9.png"
];

const songs=[
"assets/1.mp3","assets/2.mp3","assets/3.mp3",
"assets/4.mp3","assets/5.mp3"
];

// ================= RANDOM =================
function loadRandom(){
    bg.src = images[Math.floor(Math.random()*images.length)];
    music.src = songs[Math.floor(Math.random()*songs.length)];
}
loadRandom();

// ================= AUTO NEXT =================
music.addEventListener("ended",()=>{
    loadRandom();
    music.play();
});

// ================= TEXT =================
let text="TY FOR THROWING MBG";
let i=0;

function type(){
    if(i<text.length){
        typing.innerHTML += text[i++];
        setTimeout(type,80);
    }
}
type();

// ================= AUDIO =================
let ctx, analyser, source, data;
let running=false;

// ================= PLAY =================
btn.onclick=()=>{
    music.play();
    if(!ctx) setupAudio();
    btn.style.display="none";
};

// ================= AUDIO ENGINE =================
function setupAudio(){

    ctx=new (window.AudioContext||window.webkitAudioContext)();

    analyser=ctx.createAnalyser();
    source=ctx.createMediaElementSource(music);

    source.connect(analyser);
    analyser.connect(ctx.destination);

    analyser.fftSize=256;
    data=new Uint8Array(analyser.frequencyBinCount);

    loop();
}

// ================= CINEMATIC LOOP =================
let t=0;
let zoom=1;

function loop(){

    analyser.getByteFrequencyData(data);

    // ================= BASS =================
    let bass=0;
    for(let i=0;i<6;i++) bass+=data[i];
    bass/=6;

    // ================= SMOOTH BREATH =================
    t += 0.003;

    let breathe = Math.sin(t) * 0.02;
    let bassPulse = bass / 255 * 0.05;

    let targetZoom = 1 + breathe + bassPulse;

    zoom += (targetZoom - zoom) * 0.05;

    bg.style.transform = `scale(${zoom})`;

    // ================= GLOW =================
    glow.style.opacity = 0.2 + bass/600;

    // ================= TEXT COLOR (soft cinematic) =================
    typing.style.opacity = 0.7 + bass/500;

    requestAnimationFrame(loop);
}

</script>

</body>
</html>

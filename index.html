<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DJ Rainbow + Flicker Mode</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
    height:100vh;
    background:black;
    overflow:hidden;
    font-family:monospace;
}

/* IMAGE NORMAL */
#bg{
    position:absolute;
    width:100%;
    height:100%;
    object-fit:contain;
    background:black;
}

/* TEXT */
#typing{
    position:absolute;
    top:20px;
    width:100%;
    text-align:center;
    font-size:14px;
    z-index:10;
    color:white;
    opacity:0.85;
    transition:0.1s;
}

/* CANVAS */
canvas{
    position:absolute;
    bottom:0;
    width:100%;
    height:140px;
}

/* BUTTON */
#btn{
    position:absolute;
    bottom:40px;
    left:50%;
    transform:translateX(-50%);
    padding:12px;
    background:#c2185b;
    color:white;
    border:none;
    width:80%;
}
</style>
</head>

<body>

<div id="screen">
    <div id="typing"></div>
    <img id="bg">
    <canvas id="wave"></canvas>
    <button id="btn">▶️ PLAY</button>
</div>

<audio id="music" loop></audio>

<script>

// ================= ELEMENT =================
let bg=document.getElementById("bg");
let audio=document.getElementById("music");
let btn=document.getElementById("btn");
let typing=document.getElementById("typing");
let canvas=document.getElementById("wave");
let c=canvas.getContext("2d");

// ================= MEDIA =================
const images=[
"assets/1.png","assets/2.png","assets/3.png","assets/4.png",
"assets/5.jpg","assets/6.jpeg","assets/7.jpeg","assets/8.png",
"assets/9.png"
];

const songs=[
"assets/1.mp3","assets/2.mp3","assets/3.mp3",
"assets/4.mp3","assets/5.mp3"
];

// ================= LOAD RANDOM =================
function loadRandom(){
    bg.src=images[Math.floor(Math.random()*images.length)];
    audio.src=songs[Math.floor(Math.random()*songs.length)];
}
loadRandom();

audio.addEventListener("ended",()=>{
    loadRandom();
    audio.play();
});

// ================= TEXT =================
let text="TY FOR THROWING MBG 💀";
let i=0;

function type(){
    if(i < text.length){
        typing.innerHTML += text[i++];
        setTimeout(type,55);
    }
}
type();

// ⚡ TEXT FLICKER (GLITCH)
setInterval(()=>{
    let r=Math.random();

    if(r > 0.92){
        typing.style.opacity="0.2";
        typing.style.letterSpacing="4px";
    }else if(r > 0.85){
        typing.style.opacity="0.5";
        typing.style.letterSpacing="2px";
    }else{
        typing.style.opacity="0.85";
        typing.style.letterSpacing="2px";
    }
},80);

// ================= RAINBOW =================
function rainbow(){
    return `hsl(${Date.now()*0.05 % 360},100%,60%)`;
}

// ================= AUDIO =================
let ctx, analyser, source, data;
let running=false;

// ================= PLAY =================
btn.onclick=()=>{
    audio.play();

    if(!ctx){
        setupAudio();
    }else if(ctx.state==="suspended"){
        ctx.resume();
    }

    btn.style.display="none";
};

// ================= AUDIO SETUP =================
function setupAudio(){

    if(running) return;
    running=true;

    ctx=new (window.AudioContext||window.webkitAudioContext)();

    analyser=ctx.createAnalyser();
    source=ctx.createMediaElementSource(audio);

    source.connect(analyser);
    analyser.connect(ctx.destination);

    analyser.fftSize=256;
    data=new Uint8Array(analyser.frequencyBinCount);

    resize();
    window.addEventListener("resize",resize);

    loop();
}

// ================= RESIZE =================
function resize(){
    canvas.width=innerWidth;
    canvas.height=140;
}

// ================= RAINBOW FREQUENCY =================
function draw(){

    analyser.getByteFrequencyData(data);

    c.clearRect(0,0,canvas.width,canvas.height);

    let w=canvas.width/data.length;

    for(let i=0;i<data.length;i++){

        let h=data[i]*0.6;

        let hue=(i/data.length)*360;

        c.fillStyle=`hsl(${hue},100%,60%)`;

        c.fillRect(i*w,canvas.height-h,w-1,h);
    }
}

// ================= LOOP =================
function loop(){

    draw();
    requestAnimationFrame(loop);
}

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shoyounya gabut</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
    height:100vh;
    background:black;
    font-family:monospace;
    overflow:hidden;
}

#screen{
    width:100%;
    height:100%;
    transform: translateZ(0);
}

img{
    position:absolute;
    width:100%;
    height:100%;
    object-fit:contain;
    background:black;
}

#typing{
    position:absolute;
    top:20px;
    width:100%;
    text-align:center;
    color:#00aaff;
}

.btn{
    position:absolute;
    bottom:40px;
    left:50%;
    transform:translateX(-50%);
    padding:12px;
    background:#c2185b;
    color:white;
    border:none;
    width:80%;
    opacity:0;
}

.show{opacity:1;}

.flash{
    position:fixed;
    width:100%;
    height:100%;
    background:white;
    opacity:0;
    pointer-events:none;
}

.flash.on{opacity:0.15;}
</style>
</head>

<body>

<div class="flash" id="flash"></div>

<div id="screen">
    <img id="bg">
    <div id="typing"></div>
    <button class="btn" id="btn">▶️ PLAY</button>
</div>

<audio id="music" loop></audio>

<script>

// ===== ELEMENT =====
let bg = document.getElementById("bg");
let audio = document.getElementById("music");
let btn = document.getElementById("btn");
let typing = document.getElementById("typing");
let screen = document.getElementById("screen");
let flash = document.getElementById("flash");

// ===== RANDOM =====
const images = [
"assets/1.png","assets/2.png","assets/3.png","assets/4.png",
"assets/5.jpg","assets/6.jpeg","assets/7.jpeg","assets/8.png"
];

const songs = [
"assets/1.mp3","assets/2.mp3","assets/3.mp3",
"assets/4.mp3","assets/5.mp3"
];

bg.src = images[Math.floor(Math.random()*images.length)];
audio.src = songs[Math.floor(Math.random()*songs.length)];

// ===== TYPING =====
let text="ty for throwing MBG💩";
let i=0;

function type(){
    if(i<text.length){
        typing.innerHTML+=text[i++];
        setTimeout(type,60);
    }else{
        btn.classList.add("show");
    }
}
type();

// ===== PLAY =====
btn.onclick=()=>{
    audio.play().then(()=>{
        setupAudio();
        btn.innerText="🔊 SOUND ON";
    }).catch(()=>{
        btn.innerText="😔😔😔";
    });
};

// ===== AUDIO ENGINE =====
let ctx, analyser, source, data;

let scale = 1;
let targetScale = 1;

let tx = 0, ty = 0;

function setupAudio(){
    ctx = new (window.AudioContext || window.webkitAudioContext)();

    if(ctx.state === "suspended") ctx.resume();

    analyser = ctx.createAnalyser();
    source = ctx.createMediaElementSource(audio);

    source.connect(analyser);
    analyser.connect(ctx.destination);

    analyser.fftSize = 128;
    data = new Uint8Array(analyser.frequencyBinCount);

    beat();
}

function beat(){
    analyser.getByteFrequencyData(data);

    let bass = 0;
    for(let i=0;i<6;i++) bass += data[i];

    if(bass > 1200){
        targetScale = 1.05;

        flash.classList.add("on");
        setTimeout(()=>flash.classList.remove("on"),60);

        tx = (Math.random()-0.5)*3;
        ty = (Math.random()-0.5)*3;

    }else{
        targetScale = 1;
        tx *= 0.9;
        ty *= 0.9;
    }

    scale += (targetScale - scale)*0.1;

    screen.style.transform =
        `translate(${tx}px,${ty}px) scale(${scale})`;

    requestAnimationFrame(beat);
}

</script>

</body>
</html>

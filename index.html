<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MV Medium Jedug Auto</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
    height:100vh;
    background:black;
    overflow:hidden;
    font-family:monospace;
}

#screen{
    width:100%;
    height:100%;
    transform:translateZ(0);
}

img{
    position:absolute;
    width:100%;
    height:100%;
    object-fit:contain;
    background:black;
}

#typing{
    position:absolute;
    top:20px;
    width:100%;
    text-align:center;
    color:#00aaff;
}

.btn{
    position:absolute;
    bottom:40px;
    left:50%;
    transform:translateX(-50%);
    padding:12px;
    background:#c2185b;
    color:white;
    border:none;
    width:80%;
    opacity:0;
}

.show{opacity:1;}

canvas{
    position:absolute;
    bottom:0;
    width:100%;
    height:140px;
    opacity:0.65;
}
</style>
</head>

<body>

<div id="screen">
    <img id="bg">
    <canvas id="wave"></canvas>
    <div id="typing"></div>
    <button class="btn" id="btn">▶️ PLAY</button>
</div>

<audio id="music" loop></audio>

<script>

// ===== ELEMENT =====
let bg=document.getElementById("bg");
let audio=document.getElementById("music");
let btn=document.getElementById("btn");
let typing=document.getElementById("typing");
let screen=document.getElementById("screen");

// ===== MEDIA =====
const images=[
"assets/1.png","assets/2.png","assets/3.png","assets/4.png",
"assets/5.jpg","assets/6.jpeg","assets/7.jpeg","assets/8.png",
"assets/9.png"
];

const songs=[
"assets/1.mp3","assets/2.mp3","assets/3.mp3",
"assets/4.mp3","assets/5.mp3"
];

// ===== INIT RANDOM =====
function loadRandom(){
    bg.src = images[Math.floor(Math.random()*images.length)];
    audio.src = songs[Math.floor(Math.random()*songs.length)];
}

loadRandom();

// ===== AUTO NEXT SONG =====
audio.addEventListener("ended", ()=>{
    loadRandom();
    audio.play();
});

// ===== TEXT =====
let text="MEDIUM JEDUG AUTO MODE";
let i=0;

function type(){
    if(i<text.length){
        typing.innerHTML+=text[i++];
        setTimeout(type,50);
    }else{
        btn.classList.add("show");
    }
}
type();

// ===== AUDIO ENGINE =====
let ctx, analyser, source, data;
let running=false;

// ===== CAMERA =====
let zoom=1;
let camX=0, camY=0;
let velX=0, velY=0;

// ===== ENERGY =====
let smoothedBass=0;
let smoothedEnergy=0;
let lastEnergy=0;

// ===== COOLDOWN SYSTEM (ANTI SPAM SHAKE) =====
let kickCooldown=0;

// ===== CANVAS =====
let canvas=document.getElementById("wave");
let c=canvas.getContext("2d");

function resize(){
    canvas.width=innerWidth;
    canvas.height=140;
}
resize();
addEventListener("resize",resize);

// ===== PLAY =====
btn.onclick=()=>{
    audio.play();

    if(!ctx){
        setupAudio();
    }else if(ctx.state==="suspended"){
        ctx.resume();
    }

    btn.style.display="none";
};

// ===== SETUP =====
function setupAudio(){

    if(running) return;
    running=true;

    ctx=new (window.AudioContext||window.webkitAudioContext)();

    analyser=ctx.createAnalyser();
    source=ctx.createMediaElementSource(audio);

    source.connect(analyser);
    analyser.connect(ctx.destination);

    analyser.fftSize=256;
    data=new Uint8Array(analyser.frequencyBinCount);

    loop();
}

// ===== DRAW =====
function draw(){

    analyser.getByteFrequencyData(data);

    c.clearRect(0,0,canvas.width,canvas.height);

    let barWidth = canvas.width / data.length;

    for(let i=0;i<data.length;i++){

        let v=data[i];
        let h=v*0.55;

        c.fillStyle="#00d9ff";
        c.fillRect(i*barWidth, canvas.height-h, barWidth-1, h);
    }
}

// ===== LOOP =====
function loop(){

    analyser.getByteFrequencyData(data);

    // ===== BASS =====
    let bass=0;
    for(let i=0;i<5;i++){
        bass += data[i];
    }
    bass = bass / 5;

    // ===== ENERGY =====
    let energy=0;
    for(let i=0;i<10;i++){
        energy += data[i];
    }
    energy = energy / 10;

    // ===== SMOOTH =====
    smoothedBass += (bass - smoothedBass) * 0.12;
    smoothedEnergy += (energy - smoothedEnergy) * 0.1;

    let diff = smoothedEnergy - lastEnergy;

    // ===== COOLDOWN (BIAR JEDUG GAK TERUS) =====
    if(kickCooldown > 0) kickCooldown--;

    let kick = smoothedBass > 120 && diff > 6 && kickCooldown === 0;

    if(kick){
        kickCooldown = 18; // jeda antar kick (~medium rhythm)

        // ===== MEDIUM SHAKE =====
        velX += (Math.random()-0.5) * 0.6;
        velY += (Math.random()-0.5) * 0.6;
    }

    // ===== CAMERA =====
    camX += velX;
    camY += velY;

    velX *= 0.78;
    velY *= 0.78;

    camX *= 0.95;
    camY *= 0.95;

    // ===== ZOOM (SMOOTH BREATH) =====
    let pulse = smoothedEnergy / 255;
    let wave = Math.sin(Date.now()*0.0025)*0.008;

    let targetZoom = 1 + (pulse * 0.04) + wave;

    zoom += (targetZoom - zoom) * 0.07;

    screen.style.transform =
    `translate(${camX}px,${camY}px) scale(${zoom})`;

    lastEnergy = smoothedEnergy;

    draw();

    requestAnimationFrame(loop);
}

</script>

</body>
</html>

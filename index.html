<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MV Fast Drop Stable</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
    height:100vh;
    background:black;
    overflow:hidden;
    font-family:monospace;
}

#screen{
    width:100%;
    height:100%;
    transform:translateZ(0);
}

img{
    position:absolute;
    width:100%;
    height:100%;
    object-fit:contain;
    background:black;
}

#typing{
    position:absolute;
    top:20px;
    width:100%;
    text-align:center;
    font-size:14px;
    z-index:10;
}

canvas{
    position:absolute;
    bottom:0;
    width:100%;
    height:140px;
    opacity:0.6;
}

#btn{
    position:absolute;
    bottom:40px;
    left:50%;
    transform:translateX(-50%);
    padding:12px;
    background:#c2185b;
    color:white;
    border:none;
    width:80%;
}
</style>
</head>

<body>

<div id="screen">
    <div id="typing"></div>
    <img id="bg">
    <canvas id="wave"></canvas>
    <button id="btn">▶️ PLAY</button>
</div>

<audio id="music" loop></audio>

<script>

// ===== ELEMENT =====
let bg=document.getElementById("bg");
let audio=document.getElementById("music");
let btn=document.getElementById("btn");
let typing=document.getElementById("typing");
let screen=document.getElementById("screen");

// ===== MEDIA =====
const images=[
"assets/1.png","assets/2.png","assets/3.png","assets/4.png",
"assets/5.jpg","assets/6.jpeg","assets/7.jpeg","assets/8.png",
"assets/9.png"
];

const songs=[
"assets/1.mp3","assets/2.mp3","assets/3.mp3",
"assets/4.mp3","assets/5.mp3"
];

// ===== LOAD RANDOM =====
function loadRandom(){
    bg.src=images[Math.floor(Math.random()*images.length)];
    audio.src=songs[Math.floor(Math.random()*songs.length)];
}
loadRandom();

audio.addEventListener("ended",()=>{
    loadRandom();
    audio.play();
});

// ===== TYPING =====
let text="TY FOR THROWING MBG 💀";
let i=0;

function type(){
    if(i<text.length){
        typing.innerHTML += text[i++];
        setTimeout(type,60);
    }
}
type();

// ===== SMOOTH RAINBOW =====
let hue=0;
function rainbowFlow(){
    hue += 1.3;
    return `hsl(${hue},100%,60%)`;
}

// ===== AUDIO =====
let ctx, analyser, source, data;
let running=false;

// ===== MODE =====
let mode="idle";
let modeTimer=0;

// ===== CAMERA =====
let pulseZoom=1;
let camX=0, camY=0;
let velX=0, velY=0;

// ===== ENERGY =====
let bass=0;
let energy=0;
let smoothedBass=0;
let smoothedEnergy=0;
let lastEnergy=0;

// ===== CANVAS =====
let canvas=document.getElementById("wave");
let c=canvas.getContext("2d");

function resize(){
    canvas.width=innerWidth;
    canvas.height=140;
}
resize();
addEventListener("resize",resize);

// ===== PLAY =====
btn.onclick=()=>{
    audio.play();

    if(!ctx){
        setupAudio();
    }else if(ctx.state==="suspended"){
        ctx.resume();
    }

    btn.style.display="none";
};

// ===== AUDIO SETUP =====
function setupAudio(){

    if(running) return;
    running=true;

    ctx=new (window.AudioContext||window.webkitAudioContext)();

    analyser=ctx.createAnalyser();
    source=ctx.createMediaElementSource(audio);

    source.connect(analyser);
    analyser.connect(ctx.destination);

    analyser.fftSize=256;
    data=new Uint8Array(analyser.frequencyBinCount);

    loop();
}

// ===== WAVE =====
function draw(){

    analyser.getByteFrequencyData(data);

    c.clearRect(0,0,canvas.width,canvas.height);

    let w=canvas.width/data.length;

    for(let i=0;i<data.length;i++){
        let h=data[i]*0.5;
        c.fillStyle="#00d9ff";
        c.fillRect(i*w,canvas.height-h,w-1,h);
    }
}

// ===== LOOP =====
function loop(){

    analyser.getByteFrequencyData(data);

    let b=0;
    for(let i=0;i<4;i++) b+=data[i];
    bass=b/4;

    let e=0;
    for(let i=0;i<10;i++) e+=data[i];
    energy=e/10;

    smoothedBass += (bass-smoothedBass)*0.12;
    smoothedEnergy += (energy-smoothedEnergy)*0.1;

    let diff = smoothedEnergy - lastEnergy;

    // ===== FAST DROP FIX =====
    let kick = smoothedBass > 100 && diff > 4;

    if(kick){
        mode="drop";
        modeTimer = Math.max(modeTimer, 75); // 💥 lebih lama + extend
    }

    if(modeTimer>0){
        modeTimer--;
    }else{
        mode="idle";
    }

    // ===== SHAKE =====
    if(mode==="drop"){
        velX += (Math.random()-0.5)*0.8;
        velY += (Math.random()-0.5)*0.8;
    }

    camX += velX;
    camY += velY;

    velX *= 0.8;
    velY *= 0.8;

    camX *= 0.95;
    camY *= 0.95;

    // ===== ZOOM =====
    let targetZoom = (mode==="drop") ? 1.4 : 1;

    pulseZoom += (targetZoom - pulseZoom) * 0.18;

    screen.style.transform =
    `translate(${camX}px,${camY}px) scale(${pulseZoom})`;

    // ===== TEXT COLOR =====
    typing.style.color =
        (mode==="idle") ? rainbowFlow() : "#00aaff";

    lastEnergy=smoothedEnergy;

    draw();
    requestAnimationFrame(loop);
}

</script>

</body>
</html>

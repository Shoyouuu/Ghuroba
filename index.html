<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MV Pulse Zoom Clean</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
    height:100vh;
    background:black;
    overflow:hidden;
    font-family:monospace;
}

#screen{
    width:100%;
    height:100%;
    transform:translateZ(0);
}

img{
    position:absolute;
    width:100%;
    height:100%;
    object-fit:contain;
    background:black;
}

canvas{
    position:absolute;
    bottom:0;
    width:100%;
    height:140px;
    opacity:0.6;
}

#btn{
    position:absolute;
    bottom:40px;
    left:50%;
    transform:translateX(-50%);
    padding:12px;
    background:#c2185b;
    color:white;
    border:none;
    width:80%;
}
</style>
</head>

<body>

<div id="screen">
    <img id="bg">
    <canvas id="wave"></canvas>
    <button id="btn">▶️ PLAY</button>
</div>

<audio id="music" loop></audio>

<script>

// ===== ELEMENT =====
let bg=document.getElementById("bg");
let audio=document.getElementById("music");
let btn=document.getElementById("btn");
let screen=document.getElementById("screen");

// ===== MEDIA =====
const images=[
"assets/1.png","assets/2.png","assets/3.png","assets/4.png",
"assets/5.jpg","assets/6.jpeg","assets/7.jpeg","assets/8.png",
"assets/9.png"
];

const songs=[
"assets/1.mp3","assets/2.mp3","assets/3.mp3",
"assets/4.mp3","assets/5.mp3"
];

function loadRandom(){
    bg.src=images[Math.floor(Math.random()*images.length)];
    audio.src=songs[Math.floor(Math.random()*songs.length)];
}

loadRandom();

// auto next lagu + gambar
audio.addEventListener("ended", ()=>{
    loadRandom();
    audio.play();
});

// ===== AUDIO =====
let ctx, analyser, source, data;
let running=false;

// ===== PULSE ZOOM SYSTEM =====
let pulseZoom = 1;
let pulseTimer = 0;

// ===== CAMERA =====
let camX=0, camY=0;
let velX=0, velY=0;

// ===== ENERGY =====
let smoothedBass=0;
let smoothedEnergy=0;
let lastEnergy=0;

// ===== CANVAS =====
let canvas=document.getElementById("wave");
let c=canvas.getContext("2d");

function resize(){
    canvas.width=innerWidth;
    canvas.height=140;
}
resize();
addEventListener("resize",resize);

// ===== PLAY =====
btn.onclick=()=>{
    audio.play();

    if(!ctx){
        setupAudio();
    }else if(ctx.state==="suspended"){
        ctx.resume();
    }

    btn.style.display="none";
};

// ===== SETUP =====
function setupAudio(){

    if(running) return;
    running=true;

    ctx=new (window.AudioContext||window.webkitAudioContext)();

    analyser=ctx.createAnalyser();
    source=ctx.createMediaElementSource(audio);

    source.connect(analyser);
    analyser.connect(ctx.destination);

    analyser.fftSize=256;
    data=new Uint8Array(analyser.frequencyBinCount);

    loop();
}

// ===== DRAW WAVE =====
function draw(){

    analyser.getByteFrequencyData(data);

    c.clearRect(0,0,canvas.width,canvas.height);

    let barWidth=canvas.width/data.length;

    for(let i=0;i<data.length;i++){
        let v=data[i];
        let h=v*0.5;

        c.fillStyle="#00d9ff";
        c.fillRect(i*barWidth, canvas.height-h, barWidth-1, h);
    }
}

// ===== LOOP =====
function loop(){

    analyser.getByteFrequencyData(data);

    // ===== BASS =====
    let bass=0;
    for(let i=0;i<4;i++){
        bass+=data[i];
    }
    bass=bass/4;

    // ===== ENERGY =====
    let energy=0;
    for(let i=0;i<10;i++){
        energy+=data[i];
    }
    energy=energy/10;

    // ===== SMOOTH =====
    smoothedBass += (bass-smoothedBass)*0.12;
    smoothedEnergy += (energy-smoothedEnergy)*0.1;

    let diff=smoothedEnergy-lastEnergy;

    // ===== BEAT DETECTION =====
    let kick = smoothedBass > 125 && diff > 10;

    // ===== PULSE ZOOM (ONLY ON BEAT) =====
    if(pulseTimer>0){
        pulseTimer--;
    }else{
        pulseZoom += (1 - pulseZoom) * 0.25; // balik diam cepat
    }

    if(kick){

        pulseTimer = 10;   // durasi zoom singkat
        pulseZoom = 1.35;   // zoom brutal

        // kecil banget shake (opsional, masih aman)
        velX += (Math.random()-0.5)*0.4;
        velY += (Math.random()-0.5)*0.4;
    }

    camX += velX;
    camY += velY;

    velX *= 0.8;
    velY *= 0.8;

    camX *= 0.95;
    camY *= 0.95;

    // ===== APPLY ONLY IMAGE TRANSFORM =====
    screen.style.transform =
    `translate(${camX}px,${camY}px) scale(${pulseZoom})`;

    lastEnergy=smoothedEnergy;

    draw();

    requestAnimationFrame(loop);
}

</script>

</body>
</html>

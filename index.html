<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DJ Club Pro Mode</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
    height:100vh;
    background:black;
    overflow:hidden;
    font-family:monospace;
}

#screen{
    width:100%;
    height:100%;
    transform:translateZ(0);
    will-change: transform, filter;
}

img{
    position:absolute;
    width:100%;
    height:100%;
    object-fit:contain;
    background:black;
}

#typing{
    position:absolute;
    top:20px;
    width:100%;
    text-align:center;
    font-size:14px;
    z-index:10;
}

canvas{
    position:absolute;
    bottom:0;
    width:100%;
    height:140px;
    opacity:0.7;
}

#btn{
    position:absolute;
    bottom:40px;
    left:50%;
    transform:translateX(-50%);
    padding:12px;
    background:#c2185b;
    color:white;
    border:none;
    width:80%;
}
</style>
</head>

<body>

<div id="screen">
    <div id="typing">DJ CLUB PRO MODE</div>
    <img id="bg">
    <canvas id="wave"></canvas>
    <button id="btn">▶️ PLAY</button>
</div>

<audio id="music" loop></audio>

<script>

// ===== ELEMENT =====
let bg=document.getElementById("bg");
let audio=document.getElementById("music");
let btn=document.getElementById("btn");
let screen=document.getElementById("screen");

// ===== MEDIA =====
const images=[
"assets/1.png","assets/2.png","assets/3.png","assets/4.png",
"assets/5.jpg","assets/6.jpeg","assets/7.jpeg","assets/8.png",
"assets/9.png"
];

const songs=[
"assets/1.mp3","assets/2.mp3","assets/3.mp3",
"assets/4.mp3","assets/5.mp3"
];

// ===== LOAD RANDOM =====
function loadRandom(){
    bg.src=images[Math.floor(Math.random()*images.length)];
    audio.src=songs[Math.floor(Math.random()*songs.length)];
}
loadRandom();

audio.addEventListener("ended",()=>{
    loadRandom();
    audio.play();
});

// ===== AUDIO =====
let ctx, analyser, source, data;
let running=false;

// ===== CAMERA =====
let camX=0, camY=0;

// ===== ENERGY =====
let bass=0;
let energy=0;
let smoothedBass=0;
let smoothedEnergy=0;
let lastEnergy=0;

// ===== EFFECT CONTROL =====
let freeze=false;
let resetStrength=0;

// ===== PLAY =====
btn.onclick=()=>{
    audio.play();

    if(!ctx){
        setupAudio();
    }else if(ctx.state==="suspended"){
        ctx.resume();
    }

    btn.style.display="none";
};

// ===== AUDIO SETUP =====
function setupAudio(){

    if(running) return;
    running=true;

    ctx=new (window.AudioContext||window.webkitAudioContext)();

    analyser=ctx.createAnalyser();
    source=ctx.createMediaElementSource(audio);

    source.connect(analyser);
    analyser.connect(ctx.destination);

    analyser.fftSize=256;
    data=new Uint8Array(analyser.frequencyBinCount);

    loop();
}

// ===== LOOP =====
function loop(){

    analyser.getByteFrequencyData(data);

    let b=0;
    for(let i=0;i<5;i++) b+=data[i];
    bass=b/5;

    let e=0;
    for(let i=0;i<10;i++) e+=data[i];
    energy=e/10;

    smoothedBass += (bass-smoothedBass)*0.15;
    smoothedEnergy += (energy-smoothedEnergy)*0.1;

    let diff = smoothedEnergy - lastEnergy;

    // ===== BEAT DETECT =====
    let kick = smoothedBass > 90 && diff > 5;
    let hardDrop = smoothedBass > 130 && diff > 10;

    // ===== HARD DROP SYSTEM =====
    if(hardDrop && !freeze){
        freeze = true;

        // 💡 FLASH
        screen.style.filter = "brightness(1.6)";
        setTimeout(()=>screen.style.filter="none", 90);

        // ⏸️ FREEZE 0.2s
        setTimeout(()=>{
            freeze = false;
            resetStrength = 1;
        }, 200);
    }

    // ===== SHAKE ON KICK =====
    if(!freeze && kick){
        camX += (Math.random()-0.5)*7;
        camY += (Math.random()-0.5)*7;

        resetStrength = 0.7;
    }

    // ===== SMOOTH RESET (RECOIL) =====
    camX *= 0.92;
    camY *= 0.92;

    if(resetStrength > 0){
        camX *= (1 - resetStrength*0.08);
        camY *= (1 - resetStrength*0.08);

        resetStrength *= 0.92;
    }

    // ===== APPLY =====
    screen.style.transform = `
    translate(${camX}px,${camY}px)
    `;

    lastEnergy=smoothedEnergy;

    requestAnimationFrame(loop);
}

</script>

</body>
</html>
